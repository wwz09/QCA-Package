name: 初始同步 openwrt-package 仓库

on:
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write



jobs:
  initial-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # 检出当前仓库
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 设置工作流权限
      - name: 设置工作流权限
        run: |
          echo "设置工作流权限完成"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 配置Git
      - name: 配置Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # 清空当前目录除了.git和.github的内容
      - name: 清空当前目录
        run: |
          # 先删除所有文件
          find . -type f -not -path "./.git/*" -not -path "./.github/*" -not -name ".sync_history" -exec rm -f {} \;
          # 再删除所有空目录
          find . -type d -not -path "./.git" -not -path "./.github" -not -path "./.git/*" -not -path "./.github/*" -empty -delete
          echo "目录清理完成"

      # 克隆目标仓库内容到临时目录，然后移动到当前目录
      - name: 克隆并同步目标仓库
        run: |
          TARGET_REPO="https://github.com/xuanranran/openwrt-package.git"
          TEMP_CLONE_DIR="temp_clone"
          
          # 清理临时目录
          rm -rf $TEMP_CLONE_DIR || true
          
          # 克隆目标仓库
          git clone --depth 1 $TARGET_REPO $TEMP_CLONE_DIR
          echo "仓库克隆完成"
          
          # 将临时目录中的内容移动到当前目录
          mv $TEMP_CLONE_DIR/* . 2>/dev/null || true
          mv $TEMP_CLONE_DIR/.* . 2>/dev/null || true
          echo "内容移动完成"
          
          # 清理临时目录
          rm -rf $TEMP_CLONE_DIR || true
          echo "临时目录清理完成"

      # 记录同步历史
      - name: 记录同步历史
        run: |
          # 获取目标仓库的最新提交
          TARGET_REPO="https://github.com/xuanranran/openwrt-package.git"
          git ls-remote $TARGET_REPO HEAD | cut -f1 > .sync_history
          echo "同步历史记录完成"

      # 提交并推送更改
      - name: 提交并推送更改
        run: |
          # 检查是否有变更
          if git status --porcelain | grep -q .; then
            # 添加所有变更
            git add .
            
            # 提交变更
            git commit -m "Initial sync with xuanranran/openwrt-package"
            
            # 推送变更
            git push origin main
            echo "初始同步完成并推送到远程仓库"
          else
            echo "无变更需要推送"
          fi

      # 错误处理
      - name: 错误处理
        if: failure()
        run: |
          echo "同步过程中出现错误，记录详细日志"
          # 这里可以添加更多错误处理逻辑，例如发送通知等

# 工作流说明：
# 1. 触发方式：只能手动触发
# 2. 执行逻辑：
#    - 检出当前仓库
#    - 清空当前目录除了.git和.github的内容
#    - 克隆目标仓库到临时目录
#    - 将内容移动到当前目录
#    - 记录目标仓库的最新提交哈希
#    - 提交并推送更改到当前仓库
# 3. 注意事项：
#    - 此工作流仅用于初始同步
#    - 后续的定期同步使用 sync-openwrt-package.yml 工作流