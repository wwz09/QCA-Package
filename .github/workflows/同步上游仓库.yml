name: 同步上游仓库

on:
  # 定期触发，每周执行一次
  schedule:
    - cron: '0 0 * * 0'  # 每周日0点执行
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write



jobs:
  sync-repository:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # 检出当前仓库
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 配置Git
      - name: 配置Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # 检查目标仓库更新
      - name: 检查目标仓库更新
        id: check-update
        run: |
          # 尝试获取目标仓库的最新提交
          TARGET_REPO="https://github.com/kenzok8/jell.git"
          TARGET_BRANCH="main"
          
          # 克隆目标仓库到临时目录
          mkdir -p temp_target_repo
          cd temp_target_repo
          git clone --depth 1 $TARGET_REPO .
          
          # 获取目标仓库的最新提交哈希
          TARGET_LAST_COMMIT=$(git rev-parse HEAD)
          echo "目标仓库最新提交: $TARGET_LAST_COMMIT"
          
          # 检查本地是否已有同步记录
          if [ -f ../.sync_history ]; then
            LAST_SYNCED_COMMIT=$(cat ../.sync_history)
            echo "上次同步的提交: $LAST_SYNCED_COMMIT"
            
            if [ "$TARGET_LAST_COMMIT" == "$LAST_SYNCED_COMMIT" ]; then
              echo "目标仓库无更新，跳过同步"
              echo "has_update=false" >> $GITHUB_OUTPUT
            else
              echo "检测到目标仓库有更新，开始同步"
              echo "has_update=true" >> $GITHUB_OUTPUT
              echo "target_commit=$TARGET_LAST_COMMIT" >> $GITHUB_OUTPUT
            fi
          else
            echo "首次同步，开始同步目标仓库"
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "target_commit=$TARGET_LAST_COMMIT" >> $GITHUB_OUTPUT
          fi
          
          cd ..

      # 同步目标仓库内容
      - name: 同步目标仓库内容
        if: steps.check-update.outputs.has_update == 'true'
        run: |
          TARGET_REPO="https://github.com/kenzok8/jell.git"
          TARGET_BRANCH="main"
          
          # 清空当前目录除了.git和.github的内容
          # 先删除所有文件
          find . -type f -not -path "./.git/*" -not -path "./.github/*" -not -name ".sync_history" -exec rm -f {} \;
          # 再删除所有空目录
          find . -type d -not -path "./.git" -not -path "./.github" -not -path "./.git/*" -not -path "./.github/*" -empty -delete
          echo "目录清理完成"
          
          # 克隆目标仓库内容到临时目录，然后移动到当前目录
          TEMP_CLONE_DIR="temp_clone"
          rm -rf $TEMP_CLONE_DIR || true
          git clone --depth 1 $TARGET_REPO $TEMP_CLONE_DIR
          
          # 将临时目录中的内容移动到当前目录
          mv $TEMP_CLONE_DIR/* . 2>/dev/null || true
          mv $TEMP_CLONE_DIR/.* . 2>/dev/null || true
          
          # 清理临时目录
          rm -rf $TEMP_CLONE_DIR || true
          echo "仓库内容同步完成"
          
          # 保留.git和.github目录
          git checkout HEAD -- .gitignore || true
          
          # 记录本次同步的提交哈希
          echo "${{ steps.check-update.outputs.target_commit }}" > .sync_history

      # 推送更新到远程仓库
      - name: 推送更新到远程仓库
        if: steps.check-update.outputs.has_update == 'true'
        run: |
          # 检查是否有变更
          if git status --porcelain | grep -q .; then
            # 添加所有变更
            git add .
            
            # 提交变更
            git commit -m "Sync with kenzok8/jell at ${{ steps.check-update.outputs.target_commit }}"
            
            # 推送变更
            git push origin main
            echo "同步完成并推送到远程仓库"
          else
            echo "无变更需要推送"
          fi

      # 错误处理和重试机制
      - name: 错误处理
        if: failure()
        run: |
          echo "同步过程中出现错误，记录详细日志"
          # 这里可以添加更多错误处理逻辑，例如发送通知等

      # 清理临时文件
      - name: 清理临时文件
        run: |
          # 使用强制递归删除整个临时目录
          rm -rf temp_target_repo 2>/dev/null || true
          echo "临时目录清理完成"

# 工作流配置说明：
# 1. 触发方式：每周自动执行一次，同时支持手动触发
# 2. 同步逻辑：
#    - 检查目标仓库的最新提交
#    - 与上次同步的提交进行比较
#    - 如有更新，清空当前目录并克隆目标仓库内容
#    - 记录本次同步的提交哈希
#    - 推送更新到远程仓库
# 3. 错误处理：当同步过程中出现错误时，记录详细日志
# 4. 配置选项：
#    - 可以修改cron表达式调整同步频率
#    - 可以修改TARGET_REPO和TARGET_BRANCH变量指定目标仓库和分支
#    - 可以添加额外的部署步骤在同步后执行
